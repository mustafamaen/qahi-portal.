<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAHI - Biomedical Engineering System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <header class="bg-[#002855] text-white shadow-xl sticky top-0 z-50 print:hidden">
        <div class="container mx-auto px-6 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-heart-pulse text-[#d41111] text-3xl bg-white p-2 rounded-lg"></i>
                    <div>
                        <h1 class="text-xl font-black uppercase tracking-tighter leading-none">Queen Alia Heart Institute</h1>
                        <span class="text-[10px] text-blue-300 font-bold uppercase tracking-[0.2em]">Bio-Archive System</span>
                    </div>
                </div>
                <nav class="flex space-x-1">
                    <button onclick="showSection('archive')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition text-yellow-400 border border-yellow-400/30">+ Add Equipment</button>
                    <button onclick="showSection('service')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition">New Report</button>
                    <button onclick="showSection('history')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition text-blue-200">Archive Log</button>
                </nav>
            </div>
        </div>
    </header>

    <main class="container mx-auto mt-6 p-4 print:p-0">

        <section id="archive-section" class="max-w-5xl mx-auto animate-fade-in print:hidden">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border-t-4 border-yellow-500">
                <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                    <h2 class="text-lg font-black text-slate-800 uppercase">Register New Medical Device</h2>
                </div>
                <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase">Device Name</label>
                        <input id="reg-name" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none focus:ring-2 focus:ring-yellow-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase">Department</label>
                        <select id="reg-dept" class="w-full border rounded p-3 mt-1 bg-slate-50">
                            <option>ICU - Intensive Care</option>
                            <option>CCU - Cardiac Care</option>
                            <option>OR - Operating Room</option>
                            <option>Cath Lab</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase">Manufacturer</label>
                        <input id="reg-vendor" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase">Serial Number</label>
                        <input id="reg-sn" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50">
                    </div>
                    <div class="md:col-span-2">
                        <button onclick="registerDevice()" class="w-full bg-yellow-500 text-[#002855] font-black py-4 rounded-xl shadow-lg hover:bg-yellow-400 transition uppercase">Archive Asset</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="service-section" class="hidden max-w-5xl mx-auto animate-fade-in print:hidden">
            <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border-t-4 border-blue-600">
                <div class="p-8 space-y-6">
                    <div class="bg-blue-50 p-4 rounded-xl">
                        <label class="text-[10px] font-black text-blue-600 uppercase mb-2 block">Link to Archived Asset</label>
                        <select id="service-asset-select" class="w-full border-2 border-blue-200 rounded-lg p-3 font-bold text-slate-800 outline-none">
                            <option>-- Select Device --</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <h3 class="text-xs font-black text-slate-400 uppercase border-b pb-2">Technical Findings</h3>
                            <textarea id="service-parts" class="w-full border rounded p-3 bg-slate-50" rows="2" placeholder="Parts Used"></textarea>
                            <textarea id="service-action" class="w-full border rounded p-3 bg-slate-50" rows="4" placeholder="Work Performed"></textarea>
                        </div>
                        <div class="space-y-4">
                            <h3 class="text-xs font-black text-slate-400 uppercase border-b pb-2">Labor & Sign-off</h3>
                            <input id="service-engineer" type="text" class="w-full border rounded p-3 bg-slate-50" placeholder="Engineer Name">
                            <div class="grid grid-cols-2 gap-4">
                                <input id="service-time" type="number" class="w-full border rounded p-3 bg-slate-50" placeholder="Labor Hours">
                                <input id="service-pm" type="date" class="w-full border rounded p-3 bg-orange-50">
                            </div>
                            <button onclick="saveReport()" class="w-full bg-[#002855] text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-800 transition uppercase">Submit & Finalize</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="history-section" class="hidden animate-fade-in">
            <div id="print-area" class="bg-white rounded-2xl shadow-xl overflow-hidden print:shadow-none print:m-0">
                <div class="p-6 bg-slate-800 text-white flex justify-between items-center print:hidden">
                    <h2 class="text-lg font-black uppercase tracking-tight">Institute Archive Log</h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-100 text-slate-500 text-[10px] uppercase font-black">
                            <tr>
                                <th class="p-4">Service Date</th>
                                <th class="p-4">Equipment</th>
                                <th class="p-4">Engineer</th>
                                <th class="p-4">Parts</th>
                                <th class="p-4 text-center print:hidden">Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <script>
        let archive = [];
        let reports = [];

        function showSection(section) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section + '-section').classList.remove('hidden');
        }

        function registerDevice() {
            const name = document.getElementById('reg-name').value;
            const sn = document.getElementById('reg-sn').value;
            const dept = document.getElementById('reg-dept').value;
            const vendor = document.getElementById('reg-vendor').value;
            if(!name || !sn) return alert("Required fields missing.");
            
            const device = { name, sn, dept, vendor };
            archive.push(device);
            updateArchiveUI();
            alert("Device Archived.");
            showSection('service');
        }

        function updateArchiveUI() {
            const select = document.getElementById('service-asset-select');
            select.innerHTML = '<option>-- Select Device --</option>' + 
                archive.map(d => `<option value="${d.name}|${d.sn}|${d.dept}|${d.vendor}">${d.name} (SN: ${d.sn})</option>`).join('');
        }

        function saveReport() {
            const assetData = document.getElementById('service-asset-select').value.split('|');
            const data = {
                date: new Date().toLocaleDateString(),
                name: assetData[0],
                sn: assetData[1],
                dept: assetData[2],
                vendor: assetData[3],
                engineer: document.getElementById('service-engineer').value,
                time: document.getElementById('service-time').value,
                parts: document.getElementById('service-parts').value,
                action: document.getElementById('service-action').value,
                pm: document.getElementById('service-pm').value
            };
            reports.push(data);
            updateHistoryUI();
            showSection('history');
        }

        function updateHistoryUI() {
            const body = document.getElementById('history-table-body');
            body.innerHTML = reports.map((r, i) => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-mono text-[10px]">${r.date}</td>
                    <td class="p-4 font-bold text-blue-900">${r.name}<br><span class="text-[9px] font-normal text-slate-400">SN: ${r.sn}</span></td>
                    <td class="p-4">${r.engineer}</td>
                    <td class="p-4 text-[10px] truncate max-w-[100px]">${r.parts}</td>
                    <td class="p-4 text-center print:hidden">
                        <button onclick="printReport(${i})" class="text-blue-600 font-black text-[10px] uppercase border border-blue-600 px-2 py-1 rounded hover:bg-blue-600 hover:text-white transition">Print A4 PDF</button>
                    </td>
                </tr>
            `).join('');
        }

        function printReport(index) {
            const r = reports[index];
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <style>
                        body { font-family: Arial; padding: 40px; color: #333; line-height: 1.6; }
                        .header { border-bottom: 4px solid #002855; padding-bottom: 10px; margin-bottom: 30px; }
                        .h1 { color: #002855; font-size: 24pt; font-weight: bold; margin: 0; }
                        .h2 { color: #d41111; font-size: 14pt; margin: 0; }
                        .title { text-align: center; background: #f0f0f0; padding: 10px; margin: 20px 0; font-weight: bold; border: 1px solid #002855; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 10pt; }
                        th { background: #f9f9f9; width: 30%; font-weight: bold; }
                        .box { border: 1px solid #ddd; padding: 15px; min-height: 100px; margin-bottom: 20px; font-size: 10pt; }
                        .sigs { margin-top: 60px; display: flex; justify-content: space-between; }
                        .sig-col { width: 45%; text-align: center; border-top: 1px solid #000; padding-top: 5px; font-weight: bold; font-size: 10pt; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <div class="h1">Queen Alia Heart Institute</div>
                        <div class="h2">Biomedical Engineering Division</div>
                    </div>
                    <div class="title">TECHNICAL SERVICE REPORT</div>
                    <table>
                        <tr><th>Equipment</th><td>${r.name}</td><th>Serial Number</th><td>${r.sn}</td></tr>
                        <tr><th>Manufacturer</th><td>${r.vendor}</td><th>Department</th><td>${r.dept}</td></tr>
                        <tr><th>Engineer</th><td>${r.engineer}</td><th>Date</th><td>${r.date}</td></tr>
                        <tr><th>Labor Time</th><td>${r.time} Hours</td><th>Next PM Due</th><td>${r.pm}</td></tr>
                    </table>
                    <div style="font-weight:bold; font-size:10pt;">WORK PERFORMED:</div>
                    <div class="box">${r.action}</div>
                    <div style="font-weight:bold; font-size:10pt;">PARTS USED:</div>
                    <div class="box">${r.parts}</div>
                    <div class="sigs">
                        <div class="sig-col">Maintenance Engineer Signature</div>
                        <div class="sig-col">Head of Department Approval</div>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }
    </script>
</body>
</html>
