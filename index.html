<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QAHI - Biomedical Master Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans text-slate-900">

    <header class="bg-[#002855] text-white shadow-xl sticky top-0 z-50 print:hidden">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <i class="fas fa-heart-pulse text-[#d41111] text-3xl bg-white p-2 rounded-lg"></i>
                <div>
                    <h1 class="text-xl font-black uppercase tracking-tighter leading-none">Queen Alia Heart Institute</h1>
                    <span class="text-[10px] text-blue-300 font-bold uppercase tracking-widest">Biomedical Engineering Division</span>
                </div>
            </div>
            <nav class="flex space-x-1">
                <button onclick="showSection('archive')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition text-yellow-400 border border-yellow-400/30">Add Device</button>
                <button onclick="showSection('service')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition">New Report</button>
                <button onclick="showSection('history-card')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition text-green-400">Device History Card</button>
                <button onclick="showSection('history')" class="px-3 py-2 hover:bg-blue-800 rounded font-bold text-xs uppercase transition text-blue-200">Full Archive</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto mt-6 p-4">

        <section id="archive-section" class="max-w-6xl mx-auto animate-fade-in">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border-t-4 border-yellow-500">
                <div class="p-6 border-b bg-slate-50 flex justify-between items-center">
                    <h2 class="text-lg font-black text-slate-800 uppercase">Archive New Medical Asset</h2>
                </div>
                <div class="p-8 grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Device Name</label>
                        <input id="reg-name" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none focus:ring-2 focus:ring-yellow-500" placeholder="e.g. ECG Monitor">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Manufacturer</label>
                        <input id="reg-man" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none" placeholder="e.g. Philips">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Model</label>
                        <input id="reg-model" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none" placeholder="e.g. Intellivue MX450">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Serial Number (S/N)</label>
                        <input id="reg-sn" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none" placeholder="Unique Tracking ID">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Local Agent</label>
                        <input id="reg-agent" type="text" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none" placeholder="Supplier Name">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Warranty Duration</label>
                        <select id="reg-warranty-duration" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none">
                            <option>1 Year</option><option>2 Years</option><option>5 Years</option><option>Lifetime</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Department</label>
                        <select id="reg-dept" class="w-full border rounded p-3 mt-1 bg-slate-50 outline-none">
                            <option>ICU</option><option>CCU</option><option>OR</option><option>Cath Lab</option><option>Emergency</option>
                        </select>
                    </div>
                    <div class="md:col-span-4 flex justify-end mt-4">
                        <button onclick="registerDevice()" class="bg-yellow-500 text-[#002855] font-black px-10 py-4 rounded-xl shadow-lg hover:bg-yellow-400 transition uppercase text-sm tracking-widest">
                            Add to Institute Registry
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="history-card-section" class="hidden max-w-5xl mx-auto animate-fade-in">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border-t-4 border-green-600">
                <div class="p-8 bg-slate-50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                    <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight">Device History Card</h2>
                    <div class="flex w-full md:w-auto">
                        <input id="search-sn" type="text" placeholder="Enter Serial Number..." class="border-2 border-green-200 rounded-l-lg px-4 py-2 outline-none focus:border-green-500 w-full">
                        <button onclick="searchHistoryCard()" class="bg-green-600 text-white px-6 py-2 rounded-r-lg hover:bg-green-700 transition font-bold uppercase text-xs">Search</button>
                    </div>
                </div>
                <div id="history-card-result" class="p-8 min-h-[300px]">
                    <div class="text-center text-slate-400 py-20">
                        <i class="fas fa-microchip text-5xl mb-4 opacity-20"></i>
                        <p>Awaiting Serial Number Input...</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="service-section" class="hidden max-w-5xl mx-auto animate-fade-in">
             <div class="bg-white rounded-2xl shadow-2xl overflow-hidden border-t-4 border-blue-600 p-8">
                <div class="bg-blue-50 p-6 rounded-xl mb-6">
                    <label class="text-[10px] font-black text-blue-600 uppercase block mb-2">Select Archived Device</label>
                    <select id="service-asset-select" class="w-full border-2 border-blue-200 rounded-lg p-3 font-bold text-slate-800 outline-none focus:border-blue-500">
                        <option>-- Choose from Archive --</option>
                    </select>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-slate-400 uppercase border-b pb-2">Technical Findings</h3>
                        <textarea id="service-parts" class="w-full border rounded p-3 bg-slate-50 outline-none" rows="3" placeholder="Spare Parts Replaced"></textarea>
                        <textarea id="service-action" class="w-full border rounded p-3 bg-slate-50 outline-none" rows="4" placeholder="Service / Repair Description"></textarea>
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-slate-400 uppercase border-b pb-2">Compliance</h3>
                        <input id="service-engineer" type="text" class="w-full border rounded p-3 bg-slate-50 outline-none" placeholder="Maintenance Engineer Name">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="service-time" type="number" step="0.5" class="w-full border rounded p-3 bg-slate-50" placeholder="Hours Worked">
                            <input id="service-pm" type="date" class="w-full border rounded p-3 bg-orange-50 font-bold">
                        </div>
                        <button onclick="saveReport()" class="w-full bg-[#002855] text-white font-black py-4 rounded-xl shadow-lg hover:bg-blue-700 transition uppercase tracking-widest text-sm">Commit Final Report</button>
                    </div>
                </div>
             </div>
        </section>

        <section id="history-section" class="hidden animate-fade-in">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-white text-[10px] uppercase font-black">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Equipment / Model</th>
                            <th class="p-4">Engineer</th>
                            <th class="p-4">Local Agent</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body" class="divide-y text-sm"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        let archive = [];
        let reports = [];

        function showSection(section) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
            document.getElementById(section + '-section').classList.remove('hidden');
        }

        function registerDevice() {
            const name = document.getElementById('reg-name').value;
            const sn = document.getElementById('reg-sn').value;
            const man = document.getElementById('reg-man').value;
            const model = document.getElementById('reg-model').value;
            const agent = document.getElementById('reg-agent').value;
            const warranty = document.getElementById('reg-warranty-duration').value;
            const dept = document.getElementById('reg-dept').value;

            if(!name || !sn) return alert("Validation Error: Device Name and S/N are required.");

            const device = { name, sn, man, model, agent, warranty, dept };
            archive.push(device);
            updateArchiveUI();
            alert(`SUCCESS: ${man} ${model} archived successfully.`);
            
            // Clear inputs
            ['reg-name', 'reg-sn', 'reg-man', 'reg-model', 'reg-agent'].forEach(id => document.getElementById(id).value = '');
            showSection('service');
        }

        function updateArchiveUI() {
            const select = document.getElementById('service-asset-select');
            select.innerHTML = '<option>-- Choose from Archive --</option>' + 
                archive.map(d => `<option value="${d.sn}">${d.man} ${d.model} (SN: ${d.sn})</option>`).join('');
        }

        function saveReport() {
            const sn = document.getElementById('service-asset-select').value;
            const device = archive.find(d => d.sn === sn);
            if(!device) return alert("Select a device from the archive.");

            const report = {
                date: new Date().toLocaleDateString(),
                name: device.name,
                man: device.man,
                model: device.model,
                sn: device.sn,
                agent: device.agent,
                engineer: document.getElementById('service-engineer').value,
                time: document.getElementById('service-time').value,
                parts: document.getElementById('service-parts').value,
                action: document.getElementById('service-action').value,
                pm: document.getElementById('service-pm').value
            };

            reports.push(report);
            updateHistoryUI();
            alert("Report Finalized.");
            showSection('history-card');
        }

        function searchHistoryCard() {
            const snInput = document.getElementById('search-sn').value.trim();
            const resultDiv = document.getElementById('history-card-result');
            const device = archive.find(d => d.sn === snInput);
            
            if(!device) {
                resultDiv.innerHTML = `<div class="text-center text-red-500 py-20 font-bold uppercase tracking-widest">No Device Found: S/N ${snInput}</div>`;
                return;
            }

            const deviceReports = reports.filter(r => r.sn === snInput);

            resultDiv.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <div class="bg-blue-900 text-white p-6 rounded-lg shadow-inner">
                        <p class="text-[10px] font-black text-blue-300 uppercase tracking-widest mb-1">Device Identity</p>
                        <p class="text-2xl font-black">${device.man} ${device.model}</p>
                        <p class="text-sm font-medium opacity-80">${device.name} | SN: ${device.sn}</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-lg border border-slate-200">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Support & Logistics</p>
                        <div class="flex justify-between border-b pb-2 mb-2">
                            <span class="text-xs text-slate-500">Agent:</span>
                            <span class="text-xs font-bold text-slate-800">${device.agent}</span>
                        </div>
                        <div class="flex justify-between border-b pb-2 mb-2">
                            <span class="text-xs text-slate-500">Warranty:</span>
                            <span class="text-xs font-bold text-green-600">${device.warranty}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-xs text-slate-500">Location:</span>
                            <span class="text-xs font-bold text-slate-800">${device.dept}</span>
                        </div>
                    </div>
                </div>
                <h4 class="text-xs font-black uppercase text-slate-400 mb-4 border-b pb-2 tracking-widest">Master Service Timeline</h4>
                <div class="space-y-4">
                    ${deviceReports.length > 0 ? deviceReports.map(r => `
                        <div class="border-l-4 border-blue-600 bg-white p-5 shadow-sm rounded-r-lg hover:shadow-md transition">
                            <div class="flex justify-between items-center mb-3">
                                <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded text-[10px] font-black uppercase">${r.date}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Engineer: ${r.engineer}</span>
                            </div>
                            <p class="text-sm font-bold text-slate-800 leading-snug">${r.action}</p>
                            <div class="mt-3 flex gap-4">
                                <p class="text-[10px] text-slate-500 font-medium">PARTS: ${r.parts || 'None'}</p>
                                <p class="text-[10px] text-orange-600 font-bold">NEXT PM: ${r.pm || 'N/A'}</p>
                            </div>
                        </div>
                    `).join('') : '<p class="text-slate-400 italic text-center py-10 bg-slate-50 rounded">No history records found for this unit.</p>'}
                </div>
            `;
        }

        function updateHistoryUI() {
            const body = document.getElementById('history-table-body');
            body.innerHTML = reports.map(r => `
                <tr class="hover:bg-slate-50">
                    <td class="p-4 font-mono text-[10px] text-slate-400">${r.date}</td>
                    <td class="p-4">
                        <div class="font-bold text-blue-900">${r.man} ${r.model}</div>
                        <div class="text-[9px] font-normal text-slate-400 italic mt-0.5">S/N: ${r.sn}</div>
                    </td>
                    <td class="p-4 font-medium">${r.engineer}</td>
                    <td class="p-4 text-[10px] font-bold text-slate-500 uppercase">${r.agent}</td>
                    <td class="p-4 text-center"><span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">Functional</span></td>
                </tr>
            `).join('');
        }
    </script>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
